name: Push Trigger Demo

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Show trigger context
        run: |
          echo "Triggered by push to branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
