name: Deploy to Apache Web Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HTML Page
        run: |
          mkdir -p build
          echo "WELCOME TO EYESONCLOUD" > build/index.html
          echo "Build complete."

      - name: Deploy to Apache Web Server
        run: |
          cp build/index.html /var/www/html/index.html
          echo "Deployed index.html to Apache web root" 
